version: '3.9'

# ─── HawkEye AI — Infrastructure ─────────────────────────────────────────────
# Starts PostgreSQL + Redis for Phases 3-4.
# Run:  docker compose up -d
# Stop: docker compose down
# Wipe: docker compose down -v

services:

  # ── PostgreSQL 16 (pgvector enabled) ───────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hawkeye_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     hawkeye
      POSTGRES_PASSWORD: hawkeye_password
      POSTGRES_DB:       hawkeye_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U hawkeye -d hawkeye_db"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hawkeye_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  10

  # ── Redis Commander (Web UI for Redis inspection) ──────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: hawkeye_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  # ── pgAdmin (Web UI for Postgres inspection) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hawkeye_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@hawkeye.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
